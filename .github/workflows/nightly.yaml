name: Nightly Regression

# Heavy, network-dependent tests that don't belong on every PR:
#   - the full behavior matrix (every synthesizable filesystem x every extractor)
#   - end_to_end.sh: downloads real vendor firmware and diffs against baselines
# Both images are built locally with Nix; no images are pushed to registries
# (the Nix store is pushed to Cachix to populate the cache).
on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch: {}

jobs:
  # Don't burn compute on the heavy job when nothing shipped: on the scheduled
  # run, only proceed if a release was published since the previous scheduled
  # nightly. Manual dispatch always runs (you triggered it on purpose).
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual/${{ github.event_name }} trigger -> run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Latest published (non-draft) release.
          rel="$(gh api "repos/$REPO/releases/latest" --jq '.published_at' 2>/dev/null || true)"
          # Start time of the previous *completed* scheduled nightly (this run is
          # in_progress, so it's excluded).
          prev="$(gh api "repos/$REPO/actions/workflows/nightly.yaml/runs?event=schedule&status=completed&per_page=1" \
                    --jq '.workflow_runs[0].created_at' 2>/dev/null || true)"
          echo "latest release: ${rel:-<none>} | previous nightly: ${prev:-<none>}"
          if [ -z "$rel" ] || [ -z "$prev" ]; then
            echo "No release or no prior nightly -> run (be safe)."
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "$(date -d "$rel" +%s)" -gt "$(date -d "$prev" +%s)" ]; then
            echo "Release is newer than last nightly -> run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new release since last nightly -> skip the heavy job."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  tests:
    needs: gate
    if: ${{ needs.gate.outputs.should_run == 'true' }}
    runs-on: rehosting-arc
    env:
      USER: runner
      LOGNAME: runner
      TMPDIR: /home/runner/_work/_temp
      XDG_CACHE_HOME: /home/runner/_work/.cache
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner directories
        run: mkdir -p "$TMPDIR" "$XDG_CACHE_HOME"

      - name: Require Cachix token
        env:
          CACHIX_REHOSTING: ${{ secrets.CACHIX_REHOSTING }}
        run: |
          [ -n "$CACHIX_REHOSTING" ] || {
            echo "::error::CACHIX_REHOSTING secret is not set; Nix builds would run uncached"; exit 1; }

      - name: Set up Nix
        uses: rehosting/ci/actions/nix-setup@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-backend: cachix
          cachix-name: rehosting-tools
          cachix-auth-token: ${{ secrets.CACHIX_REHOSTING }}
          # No VM needed; avoids the KVM/udevadm step that fails on Arc pods
          # which expose /dev/kvm without a working udevd.
          enable-kvm: false
          # Nightly runs on schedule/dispatch (non-PR), so nix-setup pushes the
          # built paths to Cachix (rehosting-tools) to populate the cache.

      - name: Cache firmware downloads
        uses: actions/cache@v4
        with:
          path: tests/tmp_downloads
          key: firmware-downloads-${{ hashFiles('tests/end_to_end.sh') }}
          restore-keys: |
            firmware-downloads-

      - name: Build + load production image
        run: |
          nix build -L .#dockerImage
          docker load < result

      - name: Build + load test image (fixture builders)
        run: |
          nix build -L .#testImage
          docker load < result

      # Full per-filesystem x per-extractor matrix against the test image
      # (romfs/iso/fat/zip exercised too; yaffs stays a documented skip).
      - name: Behavior characterization (full matrix)
        env:
          NO_BUILD: "1"
          TEST_IMAGE: rehosting/fw2tar-test:latest
        run: ./tests/behavior/run.sh

      # Container interface parity against the *production* image: default
      # command (banner), the command install scripts, and fakeroot_fw2tar.
      - name: Container interface (production image)
        env:
          NO_BUILD: "1"
          FW2TAR_IMAGE: rehosting/fw2tar:latest
        run: ./tests/container/run.sh

      - name: Run end-to-end firmware tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FW2TAR_IMAGE: rehosting/fw2tar:latest
          CLEANUP_DOWNLOADS: true
        run: ./tests/end_to_end.sh

      - name: Upload AX1800 Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ax1800_listing.txt
          path: tests/results/ax1800_listing.txt.new

      - name: Upload RAX545 Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rax54s_listing.txt
          path: tests/results/rax54s_listing.txt.new

      - name: Upload RAX545 Binwalk Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rax54s_binwalk_log.zip
          path: tests/tmp_downloads/RAX54Sv2-V1.1.4.28.zip_out/RAX54Sv2-V1.1.4.28.binwalk.log
