name: Build and Test Container

on:
  pull_request:
    branches:
      - main

# Registry fallback ladder (shared org pattern): real Harbor secrets on internal
# PRs, public-proxy + read-only "external" creds on forks.
env:
  REGISTRY: ${{ secrets.REHOSTING_ARC_REGISTRY || 'harbor.harbor.svc.cluster.local' }}
  USER: ${{ secrets.REHOSTING_ARC_REGISTRY_USER || 'external' }}
  TARGET: ${{ secrets.REHOSTING_ARC_REGISTRY || 'harbor.harbor.svc.cluster.local/external' }}
  EXTERNAL_REGISTRY_PASS: ${{ vars.EXTERNAL_REGISTRY_PASS }}

jobs:
  # Fast, deterministic, no image needed — the cheap per-PR guard.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --locked

  # Build + push the image to Harbor via the shared org workflow (folds in the
  # cert/buildx/login + registry cache plumbing every repo used to copy-paste).
  build:
    uses: rehosting/ci/.github/workflows/build-and-push.yml@v1
    with:
      image: rehosting/fw2tar
    secrets:
      registry: ${{ secrets.REHOSTING_ARC_REGISTRY }}
      registry-user: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
      registry-password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}

  # Deterministic permission-fidelity matrix on synthetic filesystems (no firmware
  # downloads). Pulls the just-built image and runs the "core" types; the full
  # matrix (romfs/iso/fat/zip/yaffs + extra builders) runs nightly.
  behavior:
    needs: build
    runs-on: rehosting-arc
    steps:
      - uses: actions/checkout@v4
      - name: Pull built image
        uses: rehosting/ci/actions/pull-image@v1
        with:
          registry: ${{ env.REGISTRY }}
          target: ${{ env.TARGET }}
          image: rehosting/fw2tar
          tag: ${{ github.sha }}
          local-tag: rehosting/fw2tar:latest
          username: ${{ env.USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD || env.EXTERNAL_REGISTRY_PASS }}
      - name: Behavior characterization (core types, synthetic fixtures)
        env:
          NO_BUILD: "1"
          TEST_IMAGE: rehosting/fw2tar:latest
        run: ./tests/behavior/run.sh squashfs cramfs ubifs jffs2 ext2 ext3 ext4 cpio tar
