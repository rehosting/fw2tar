name: Build and Test Container

on:
  pull_request:
    branches:
      - main

jobs:
  # Fast, deterministic, no image needed — the cheap per-PR guard.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --locked

  # Validate that the Nix image (fw2tar + unblob + binwalk v2/v3 + extractor
  # toolchain) builds — but do not push per-PR images to Harbor. Pushing happens
  # on main via publish.yaml. push:false also lets fork PRs (no secrets) build.
  build:
    uses: rehosting/ci/.github/workflows/nix-image-push.yml@v1
    with:
      image: rehosting/fw2tar
      flake-attr: .#dockerImage
      push: false
      cachix-name: rehosting-tools
      # No VM needed; avoids install-nix-action's KVM/udevadm step that fails
      # on Arc pods which expose /dev/kvm without a working udevd.
      enable-kvm: false
    secrets:
      registry: ${{ secrets.REHOSTING_ARC_REGISTRY }}
      registry-user: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
      registry-password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}
      cachix-auth-token: ${{ secrets.CACHIX_REHOSTING }}

  # Deterministic permission-fidelity matrix on synthetic filesystems (no firmware
  # downloads). Builds the Nix *test* image (fw2tar image + fixture builders) and
  # runs the "core" types; the full matrix runs nightly.
  behavior:
    runs-on: rehosting-arc
    env:
      USER: runner
      LOGNAME: runner
      TMPDIR: /home/runner/_work/_temp
      XDG_CACHE_HOME: /home/runner/_work/.cache
    steps:
      - uses: actions/checkout@v4
      - name: Prepare runner directories
        run: mkdir -p "$TMPDIR" "$XDG_CACHE_HOME"
      # Fail loudly if the Cachix token is missing on an internal run, so we
      # never silently fall back to uncached Nix builds. Skipped on fork PRs,
      # which legitimately have no access to the secret.
      - name: Require Cachix token (internal runs)
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          CACHIX_REHOSTING: ${{ secrets.CACHIX_REHOSTING }}
        run: |
          [ -n "$CACHIX_REHOSTING" ] || {
            echo "::error::CACHIX_REHOSTING secret is not set; Nix builds would run uncached"; exit 1; }
      - name: Set up Nix
        uses: rehosting/ci/actions/nix-setup@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-backend: cachix
          cachix-name: rehosting-tools
          cachix-auth-token: ${{ secrets.CACHIX_REHOSTING }}
          # No VM needed; avoids the KVM/udevadm step that fails on Arc pods
          # which expose /dev/kvm without a working udevd.
          enable-kvm: false
      - name: Build Nix test image
        run: nix build -L .#testImage
      - name: Load test image
        run: docker load < result
      - name: Behavior characterization (core types, synthetic fixtures)
        env:
          NO_BUILD: "1"
          TEST_IMAGE: rehosting/fw2tar-test:latest
        run: ./tests/behavior/run.sh squashfs cramfs ubifs jffs2 ext2 ext3 ext4 cpio tar
      # Container interface parity: default command (banner), the command
      # install scripts, and the fakeroot_fw2tar entry point. The test image is
      # a superset of the production image, so its interface is identical.
      - name: Container interface (default cmd / install / fw2tar script)
        env:
          NO_BUILD: "1"
          FW2TAR_IMAGE: rehosting/fw2tar-test:latest
        run: ./tests/container/run.sh
      # Output-layout contract: the exact set of files a run leaves in the
      # output directory (winner, per-candidate archives, manifest sidecars,
      # secondaries, nothing else) — the interface downstream consumers parse.
      - name: Output-layout contract (synthetic fixtures)
        env:
          NO_BUILD: "1"
          FW2TAR_IMAGE: rehosting/fw2tar-test:latest
        run: ./tests/contract/run.sh
