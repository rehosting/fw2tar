name: Release Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  # 1. Compute the next version (off the self-hosted pool).
  version:
    runs-on: ubuntu-latest
    outputs:
      v: ${{ steps.version.outputs.v-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get next version
        id: version
        uses: reecetech/version-increment@2024.4.4
        with:
          use_api: true

  # 2. Build + push to Harbor (:sha) AND Docker Hub (:version/:latest/:sha) via the
  #    shared org workflow.
  build:
    needs: version
    uses: rehosting/ci/.github/workflows/build-and-push.yml@v1
    with:
      image: rehosting/fw2tar
      extra-tags: |
        rehosting/fw2tar:${{ needs.version.outputs.v }}
        rehosting/fw2tar:latest
        rehosting/fw2tar:${{ github.sha }}
      dockerhub-user: rehosting
    secrets:
      registry: ${{ secrets.REHOSTING_ARC_REGISTRY }}
      registry-user: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
      registry-password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  # 3. Cut the GitHub release (after the image exists).
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.version.outputs.v }}
          name: Release ${{ needs.version.outputs.v }} ${{ github.ref }}
          body: |
            Release ${{ needs.version.outputs.v }} @${{ github.ref }}
          draft: false
          generate_release_notes: true
          prerelease: false
