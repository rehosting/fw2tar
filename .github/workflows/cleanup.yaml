name: Cleanup PR cache

# When a PR closes, delete its per-PR buildx cache tag (cache-PR-<n>) from Harbor
# so it doesn't accumulate. The build cache is written by build-and-push.yml.
on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    # Fork PRs have no registry credentials — only run for same-repo PRs.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: rehosting-arc
    steps:
      - name: Delete PR cache from Harbor
        uses: rehosting/ci/actions/cleanup-pr-cache@v1
        with:
          registry: ${{ secrets.REHOSTING_ARC_REGISTRY }}
          repository: fw2tar
          reference: cache-PR-${{ github.event.number }}
          username: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}
